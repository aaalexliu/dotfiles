# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Explicitly set resurrect directory
set -g @resurrect-dir '~/.tmux/resurrect'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'
# Save session state every 10 minutes
set -g @continuum-save-interval '10'

# Window titles - show Claude session title (or program title)
set -g set-titles on
set -g set-titles-string "#{pane_title}"
set -g automatic-rename on
set -g automatic-rename-format "#{pane_title}"

# Enable mouse mode (click to select pane, drag to select text, scroll to view history)
set -g mouse on

# Copy mode in vi-style (optional, but pairs well with mouse selection)
setw -g mode-keys vi

# When you release the mouse after dragging a selection, copy it to system clipboard
# macOS:
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Linux (X11) — use this instead of the pbcopy line above:
# bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Linux (Wayland) — use this instead if you're on Wayland:
# bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
